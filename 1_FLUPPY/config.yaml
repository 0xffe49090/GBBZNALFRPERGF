sources:
  - path: auth.log
    mode: scan
    rules:
      - name: brute_force_ip
        regex: '(\d{1,3}\.){3}\d{1,3}'
        threshold: 10
        window: 60
        action: alert

  - path: webproxy.log
    mode: scan
    rules:
      - name: credential_leak
        regex: '(password|token|secret|AKIA|amex|visa)'
        threshold: 1
        cooldown: 300
        window: 10
        action: alert

  - path: access.log
    mode: scan
    rules:
      - name: http_attack
        regex: '(\d{1,3}\.){3}\d{1,3}'
        threshold: 30
        window: 60
        action: alert
      - name: http_attack_method
        regex: '("[A-Z]+\sHTTP/...")'
        threshold: 10
        cooldown: 300
        window: 60
        action: alert

  - path: /var/log/apache2/access.log
    mode: tail
    rules:
      - name: http_attack_live
        regex: '(\d{1,3}\.){3}\d{1,3}'
        threshold: 10
        cooldown: 300
        window: 3
        action: alert