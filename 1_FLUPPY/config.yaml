sources:
  - path: auth.log
    mode: scan
    rules:
      - name: brute_force_ip
        regex: '((\d{1,3}\.){3}\d{1,3})'
        threshold: 10
        window: 60
        severity: high

  - path: horrors.log
    mode: scan
    rules:
      - name: credential_leak
        regex: '((BEGIN PRIVATE|KEY=|jdbc|redis|passwd:|password|pwd|token|root.+@|AKIA|amex|visa).+)'
        threshold: 1
        cooldown: 300
        window: 10
        severity: critical

  - path: /var/log/ufw.log
    mode: tail
    rules:
      - name: network_attack
        regex: '(UFW BLOCK.+SRC=[^\s]+)'
        threshold: 30
        cooldown: 5
        window: 3
        severity: medium

  - path: access.log
    mode: scan
    rules:
      - name: http_attack
        regex: '((\d{1,3}\.){3}\d{1,3})'
        threshold: 30
        window: 60
        severity: medium

  - path: access.log
    mode: scan
    rules:
      - name: wordpress_login_attempt
        regex: '(GET /wp-login.php)'
        threshold: 5
        window: 300
        severity: info

  - path: /var/log/apache2/access.log
    mode: tail
    rules:
      - name: http_live_attack
        regex: '((\d{1,3}\.){3}\d{1,3})'
        threshold: 10
        cooldown: 3
        window: 3
        severity: high

  - path: kern.log
    mode: scan
    rules:
      - name: segfault_monitor
        regex: '(segfault at)'
        threshold: 1
        cooldown: 300
        window: 1
        severity: critical

  - path: fail2ban.log
    mode: scan
    rules:
      - name: f2b_attack
        regex: '(Found.+$)'
        threshold: 3
        cooldown: 300
        window: 3
        severity: medium
  
  - path: /var/log/syslog
    mode: tail
    rules:
      - name: dlp_secret_data
        regex: '(SECRET-DATA-HERE)'
        threshold: 1
        cooldown: 300
        window: 60
        severity: critical

  - path: /var/log/syslog
    mode: tail
    rules:
      - name: dlp_card_rule
        regex: '(4\d{15})'
        threshold: 1
        cooldown: 300
        window: 60
        severity: critical